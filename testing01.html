<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Table</title>
</head>
<body>
  <table border="1" cellpadding="15" cellspacing="0">
    <tr>
      <th colspan="4">A</th>
    </tr>
    <tr>
      <th colspan="3">B</th>
      <th rowspan="3">C</th>
    </tr>
    <tr>
      <td>D</td>
      <td>E</td>
      <td rowspan="2">H</td>
    </tr>
    <tr>
      <td>F</td>
      <td>G</td>
    </tr>
  </table>
</body>
</html>
